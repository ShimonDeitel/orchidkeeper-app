name: Orchidkeeper
options:
  bundleIdPrefix: com.shimondeitel.orchidkeeper
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Orchidkeeper:
    type: application
    platform: iOS
    sources:
      - path: Orchidkeeper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.orchidkeeper
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Orchidkeeper/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OrchidkeeperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrchidkeeperTests
      - path: Orchidkeeper.storekit
    dependencies:
      - target: Orchidkeeper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.orchidkeeper.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OrchidkeeperUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OrchidkeeperUITests
    dependencies:
      - target: Orchidkeeper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.orchidkeeper.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Orchidkeeper:
    build:
      targets:
        Orchidkeeper: all
        OrchidkeeperTests: [test]
        OrchidkeeperUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Orchidkeeper.storekit
    test:
      config: Debug
      storeKitConfiguration: Orchidkeeper.storekit
      targets:
        - OrchidkeeperTests
        - OrchidkeeperUITests
    archive:
      config: Release
